{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto my-20 px-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 border-2 border-red-100 text-center">
        <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
            ⚠️
        </div>
        <h2 class="text-2xl font-black text-gray-900 mb-4">Supprimer mon compte ?</h2>
        <p class="text-gray-500 mb-8 leading-relaxed">
            Cette action est <strong>irréversible</strong>. Vous perdrez votre historique de missions, vos candidatures et votre solde Mbolo.
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold hover:bg-red-700 transition shadow-lg shadow-red-200">
                OUI, SUPPRIMER DÉFINITIVEMENT
            </button>
            <a href="{% url 'modifier_profil' %}" class="block w-full py-4 text-gray-500 font-bold hover:text-gray-700 transition">
                Annuler et revenir au profil
            </a>
        </form>
    </div>
</div>
{% endblock %}
