{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg border">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Recharger mon compte</h2>
        <p class="text-gray-500 text-sm">Simulation de dépôt via Mobile Money</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Montant à recharger (FCFA)</label>
            <input type="number" name="montant" placeholder="Ex: 5000" required
                class="w-full p-4 border-2 border-blue-100 rounded-xl text-2xl font-bold text-center focus:border-blue-500 outline-none">
        </div>

        <div class="grid grid-cols-3 gap-2">
            <button type="button" onclick="document.getElementsByName('montant')[0].value=2000" class="bg-gray-100 py-2 rounded-lg text-sm hover:bg-gray-200">2.000</button>
            <button type="button" onclick="document.getElementsByName('montant')[0].value=5000" class="bg-gray-100 py-2 rounded-lg text-sm hover:bg-gray-200">5.000</button>
            <button type="button" onclick="document.getElementsByName('montant')[0].value=10000" class="bg-gray-100 py-2 rounded-lg text-sm hover:bg-gray-200">10.000</button>
        </div>

        <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition shadow-md">
            Confirmer le dépôt
        </button>
    </form>
    
    <div class="mt-6 flex justify-center gap-4 opacity-50">
        <span class="text-xs font-bold uppercase">Airtel Money</span>
        <span class="text-xs font-bold uppercase">Moov Money</span>
    </div>
</div>
{% endblock %}
