{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto h-[80vh] flex flex-col bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-100">
    <div class="p-4 bg-blue-600 text-white flex items-center gap-4">
        <a href="{% url 'dashboard' %}" class="text-xl">⬅️</a>
        <div>
            <h3 class="font-black text-sm">{{ destinataire.first_name }}</h3>
            <p class="text-[10px] opacity-80 uppercase font-bold">Mission : {{ mission.titre }}</p>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
        {% for msg in messages_list %}
            <div class="flex {% if msg.expediteur == request.user %}justify-end{% endif %}">
                <div class="max-w-[80%] p-4 rounded-2xl shadow-sm {% if msg.expediteur == request.user %}bg-blue-600 text-white rounded-tr-none{% else %}bg-white text-gray-800 rounded-tl-none{% endif %}">
                    <p class="text-sm font-medium">{{ msg.contenu }}</p>
                    <p class="text-[9px] mt-1 opacity-60 text-right">{{ msg.date_envoi|date:"H:i" }}</p>
                </div>
            </div>
        {% endfor %}
    </div>

    <form method="post" class="p-4 bg-white border-t border-gray-100 flex gap-2">
        {% csrf_token %}
        <input type="text" name="contenu" placeholder="Écrivez votre message..." 
               class="flex-1 p-4 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
        <button type="submit" class="bg-blue-600 text-white p-4 rounded-2xl font-black">
            ENVOYER
        </button>
    </form>
</div>
{% endblock %}
