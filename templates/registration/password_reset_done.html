{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-10 p-8 bg-white rounded-[2.5rem] shadow-2xl border border-gray-50 text-center">
    <div class="text-5xl mb-6">📩</div>
    <h2 class="text-2xl font-black text-blue-900">Vérifiez vos emails</h2>
    <p class="text-gray-500 text-sm mt-4 leading-relaxed">
        Si un compte existe avec cet email, vous allez recevoir un lien pour créer un nouveau mot de passe d'ici quelques instants.
    </p>
    <div class="mt-8">
        <a href="{% url 'login' %}" class="text-blue-600 font-black text-sm uppercase tracking-widest">
            Retour à la connexion
        </a>
    </div>
</div>
{% endblock %}
