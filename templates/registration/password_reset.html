{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-10 p-8 bg-white rounded-[2.5rem] shadow-2xl border border-gray-50">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-black text-blue-900">Mot de passe oublié ?</h2>
        <p class="text-gray-500 text-sm mt-2">Entrez votre email, nous vous enverrons un lien de récupération.</p>
    </div>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-4">Votre Email</label>
            <input type="email" name="email" required class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">
            ENVOYER LE LIEN
        </button>
    </form>
</div>
{% endblock %}
